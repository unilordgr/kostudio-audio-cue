name: Build Windows & Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable .exe
        run: npm run dist-win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 7

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run dist-mac

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          retention-days: 7

  publish-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-files

      - name: Copy iPad web app to release files
        run: cp index.html "release-files/Kostudio Audio Cue (iPad-Web).html"

      - name: Write release notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          cat > /tmp/release-notes.md << NOTES
          ## What's new in ${TAG}

          ### iPad / Touch support
          - Download \`Kostudio Audio Cue (iPad-Web).html\`, open in **Safari on iPad**, tap Share → **Add to Home Screen** to install as a standalone app
          - Cue stack moves to a bottom sheet — tap the pill handle to expand/collapse
          - Play Cue + Next Cue always visible even when the list is collapsed
          - Save & Load work natively in Safari (stored on device via IndexedDB)
          - Export / Import .cuepro files to back up or transfer between devices
          - Safe-area support for notch and home indicator

          ### Other changes
          - Removed non-functional Sound FX / Freesound panel

          ---

          **Windows:** Download the \`.exe\` — portable, no install required.
          **Mac:** Download the \`.dmg\`, open it, drag the app to Applications. On first launch right-click → Open if macOS warns you.
          **iPad / Browser:** Download \`Kostudio Audio Cue (iPad-Web).html\`, open in Safari and Add to Home Screen.
          NOTES

      - name: Publish versioned release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" release-files/* \
            --repo ${{ github.repository }} \
            --title "Kostudio Audio Cue ${TAG}" \
            --notes-file /tmp/release-notes.md
