name: Build Windows & Mac

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable .exe
        run: npm run dist-win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 7

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run dist-mac

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          retention-days: 7

  publish-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-files

      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-files

      - name: Publish versioned release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          # Delete existing release with this tag if it exists (re-run safe)
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" release-files/* \
            --repo ${{ github.repository }} \
            --title "Kostudio Audio Cue $TAG" \
            --notes "## What's new in $TAG

          **Windows:** Download the \`.exe\` — portable, no install required.
          **Mac:** Download the \`.dmg\`, open it, drag the app to Applications. On first launch right-click → Open if macOS warns you."
